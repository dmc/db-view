<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <script type="text/javascript" language="javascript" src="/javascript/jquery.js"></script>
  <script type="text/javascript" language="javascript" src="/javascript/jquery-ui.js"></script>
  <script type="text/javascript" language="javascript" src="/javascript/jquery.dynatable.js"></script>
  <link id="theme" rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/jquery.dynatable.css">


  <script language="JavaScript" type="text/javascript">
    var presets = [
      ["", "", "", "", ""],
      ["mysql-localhost", "mysql", "localhost", "3306", "information_schema", "root", "root001"],
      ["postgres-template", "postgresql", "localhost", "5432", "world", "dmc", "dmc001"],
      ["mysql-template", "mysql", "localhost", "3306",  "database", "user", "password"],
      ["oracle-template", "oracle", "localhost", "1521", "database",  "user", "password"]
    ];


    jQuery(function($) {

      for (var i = 0; i < presets.length; i++) {
        $("#preset").append($('<option>').html(presets[i][0]).val(i));
      }

      $('#preset').on("change", function() {
        var value = $(this).val();
        $("#vendor").val(presets[value][1]);
        $("#host").val(presets[value][2]);
        $("#port").val(presets[value][3]);
        $("#database").val(presets[value][4]);
        $("#user").val(presets[value][5]);
        $("#password").val(presets[value][6]);
      });



      $('#execute').click(function() {

        $.ajax({
          url: "/query",
          type: "post",
          dataType: "json",
          data: {vendor: $('#vendor').val(),
                  host: $('#host').val(),
                  port: $('#port').val(),
                  database: $('#database').val(),
                  user: $('#user').val(),
                  password: $('#password').val(),
                  query: $('#sql').val()}
        }).done(function(data) {
    			showResultSet(data);
        }).fail(function(XMLHttpRequest, textStatus, errorThrown) {
          showErrorMessage(XMLHttpRequest, textStatus, errorThrown);
    		});
      });



    });

    function showResultSet(data){

        $("#result-set").html("");
        var $head = null,
        $body = $('<tbody>');

        $.each(data, function(index, obj) {
          if ($head === null) {
            $head = $('<tr>').append($.map(obj, function(value, name) {
              return $('<th>', {
                text: name
              });
            }));
          }

          $('<tr>').append($.map(obj, function(value, name) {
            return $('<td>', {
              text: value
            });
          })).appendTo($body);
        });
        $("#result-set").attr("border","1");
        $("#result-set").append($head).append($body);

    }

    function showErrorMessage(XMLHttpRequest, textStatus, errorThrown){
      $("#result-set").html("");
      $body = $('<tbody>').append($('<tr>')).append($('<td>',{id:'error',text: errorThrown}));
      $("#result-set").attr("border","0");
      $("#result-set").append($body);
    }

    function changeTheme() {
      $('#theme').attr("href", $("#css-list").val());
    };

  </script>

  <title>node-view</title>
</head>

<body>

  <div id="header">
    <table cellpadding="" class="header">
      <tr>
        <td align="left">
          <h1>
            db-view
          </h1>
        </td>
      </tr>
      <tr>
        <td align="right">buid on 16th June 2015.
          <br>developed by dmc system service.</td>
      </tr>
    </table>
    <hr/>
  </div>

  <div id="login-parameter">
    <table>
      <tr>
        <td>database</td>
        <td>
          <select id="preset">
          </select>
        </td>
      </tr>
    </table>
    <table>
      <tr>
        <td>vender</td>
        <td>
          <input id="vendor" name="vendor" type="text" size="40pix" value="" />
        </td>
      </tr>
      <tr>
        <td>host</td>
        <td>
          <input id="host" name="host" type="text" size="40pix" value="" />
        </td>
      </tr>
      <tr>
        <td>port</td>
        <td>
          <input id="port" name="port" type="text" size="40pix" value="" />
        </td>
      </tr>
      <tr>
        <td>database</td>
        <td>
          <input id="database" name="database" type="text" size="40pix" value="" />
        </td>
      </tr>
      <tr>
        <td>user</td>
        <td>
          <input id="user" name="user" type="text" size="40pix" value="" />
        </td>
      </tr>
      <tr>
        <td>password</td>
        <td>
          <input id="password" name="password" type="text" size="40pix" value="" />
        </td>
      </tr>
    </table>
    <input class="button" type="button" value="login" id="login" />
    <hr/>
  </div>

  <div id="query-box">
    <table>
      <tr>
        <td>
          <textarea rows="6" cols="60" name="sql" id="sql" value="">
          </textarea>
        </td>
      </tr>
    </table>
  </div>

  <div id="query-buttons">
    <table>
      <tr>
        <td>
          <input type="button" value="execute" id="execute" />
        </td>
      </tr>
    </table>
    <hr/>
  </div>

  <div id="result">
    <table id='result-set' border='1' cellpadding='1' cellspacing='0'>
    </table>
  </div>

  <div id="dialog" title="history">
  </div>


</body>

</html>
